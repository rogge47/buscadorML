<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Buscador Inteligente ML</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #f3f3f3;
    }
    input {
      padding: 10px;
      width: 300px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .container {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .card {
      background: #fff;
      padding: 15px;
      width: 250px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: left;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
    }
    .card h3 {
      font-size: 16px;
      margin: 10px 0 5px;
    }
    .price {
      color: green;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }
    a {
      text-decoration: none;
      color: #0066c0;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Buscador Inteligente de Produtos</h1>
  <p>Encontre produtos no Mercado Livre rapidamente.</p>

  <input type="text" id="searchInput" placeholder="Digite o produto">
  <button onclick="buscar()">Buscar</button>

  <div class="container" id="results"></div>

  <p style="margin-top:40px; font-size: 10px; color:#555;">
    Este site pode gerar links de afiliados do Mercado Livre.
  </p>

  <script>
    async function buscar() {
      const query = document.getElementById("searchInput").value;
      if(!query) return;

      const response = await fetch(`https://api.mercadolibre.com/sites/MLB/search?q=${encodeURIComponent(query)}&limit=20`);
      const data = await response.json();

      const produtos = data.results
        .filter(p => !p.condition.includes("used"))
        .filter(p => !p.title.toLowerCase().includes("peça"))
        .filter(p => !p.title.toLowerCase().includes("reposição"))
        .filter(p => p.seller.country_id === "BR");

      if(produtos.length === 0) {
        document.getElementById("results").innerHTML = "<p>Nenhum produto encontrado.</p>";
        return;
      }

      const maisBarato = [...produtos].sort((a,b)=>a.price-b.price)[0];
      const maisVendido = [...produtos].sort((a,b)=>b.sold_quantity-a.sold_quantity)[0];
      const melhorAvaliado = [...produtos].sort((a,b)=>{
        const aRating = a.seller?.reputation?.transactions?.ratings?.positive || 0;
        const bRating = b.seller?.reputation?.transactions?.ratings?.positive || 0;
        return bRating - aRating;
      })[0];
      const entregaRapida = produtos.find(p => p.shipping?.logistic_type === "fulfillment") || produtos[0];

      const selecionados = [
        {titulo: "💰 Mais barato", item: maisBarato},
        {titulo: "🔥 Mais vendido", item: maisVendido},
        {titulo: "⭐ Melhor avaliado", item: melhorAvaliado},
        {titulo: "🚚 Entrega rápida", item: entregaRapida}
      ];

      const container = document.getElementById("results");
      container.innerHTML = "";

      selecionados.forEach(obj => {
        if(obj.item){
          container.innerHTML += `
            <div class="card">
              <h3>${obj.titulo}</h3>
              <img src="${obj.item.thumbnail}" alt="${obj.item.title}">
              <p>${obj.item.title}</p>
              <p class="price">R$ ${obj.item.price}</p>
              <a href="${obj.item.permalink}" target="_blank">Ver produto</a>
            </div>
          `;
        }
      });
    }
  </script>

</body>
</html>
